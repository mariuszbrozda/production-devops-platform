replicaCount: 2

image:
  repository: online-store
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

ingress:
  enabled: false
  annotations: {}
  hosts:
    - host: online-store.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
