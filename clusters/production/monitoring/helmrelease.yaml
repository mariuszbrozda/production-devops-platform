apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "69.*"
      sourceRef:
        kind: HelmRepository
        name: kube-prometheus-stack
        namespace: flux-system

  valuesFrom:
    - kind: ConfigMap
      name: monitoring-values
      valuesKey: values.yaml