apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: online-store
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: ./deploy/charts/online-store
      sourceRef:
        kind: GitRepository
        name: online-store-repo
        namespace: flux-system
      interval: 1m
  values:
    image:
      repository: ${ECR_REPOSITORY}
      tag: latest
    service:
      type: ClusterIP
      port: 80